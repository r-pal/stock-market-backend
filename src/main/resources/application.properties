spring.application.name=goblin-bank

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/goblin_bank
spring.datasource.username=goblin_bank
spring.datasource.password=goblin_bank

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (set goblin.jwt.secret in production — must be >= 32 bytes for HS256)
goblin.jwt.secret=dev-only-change-me-to-at-least-32-characters-long-secret!!
goblin.jwt.expiration-seconds=86400

# Rate bounds (per-hour decimal rate, e.g. 0.05 = 5% per hour)
goblin.rates.min-hourly=-1
goblin.rates.max-hourly=1

# Default banker user seeded on startup if missing (override in prod)
goblin.banker.username=banker
goblin.banker.password=banker

# Backups (logical JSON dumps written to goblin.backup.dir)
goblin.backup.enabled=true
goblin.backup.interval-seconds=300
goblin.backup.dir=backups
goblin.backup.retain=50